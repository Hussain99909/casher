<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قارئ باركود الأدوية</title>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

#scanner{
width:500px;
margin:auto;
border:3px solid black;
}

#result{
font-size:25px;
margin-top:20px;
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<h2>قارئ باركود علب الأدوية</h2>

<div id="scanner"></div>

<div id="result">لم يتم قراءة باركود بعد</div>

<button onclick="startScanner()">تشغيل الكاميرا</button>

<script>

function startScanner(){

Quagga.init({

inputStream : {
name : "Live",
type : "LiveStream",
target: document.querySelector('#scanner'),
constraints: {
facingMode: "environment"
}
},

decoder : {
readers : [
"code_128_reader",
"ean_reader",
"ean_8_reader",
"code_39_reader",
"upc_reader"
]
}

}, function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(data){

document.getElementById("result").innerHTML =
"Barcode : " + data.codeResult.code;

});

}

</script>

</body>

</html>
